{{ define "main" }}
<div class="container">
  <div class="breadcrumb">
    <a href="/">ホーム</a> &gt; {{ .Title }}
  </div>
  <div class="page-header">
    <h1>{{ .Title }}</h1>
  </div>
  <div class="prose">
    {{ .Content }}
  </div>
  {{ if .Pages }}
  <div class="card-grid">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="card">
      <div class="card-body">
        <h3>{{ .Title }}</h3>
        <p>{{ .Params.description }}</p>
      </div>
    </a>
    {{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
